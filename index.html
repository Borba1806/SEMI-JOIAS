<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Catálogo de Semi-Joias</title>
  <style>
    body {
      background-color: #121212;
      color: #f5f5f5;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #1e1e1e;
      padding: 20px;
      text-align: center;
      color: goldenrod;
      font-size: 24px;
      font-weight: bold;
    }
    main {
      padding: 20px;
    }
    .form-container {
      background-color: #1e1e1e;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 4px;
    }
    button {
      background-color: goldenrod;
      color: #121212;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    .catalogo {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    .produto {
      background-color: #1e1e1e;
      border-radius: 8px;
      padding: 15px;
      width: 250px;
      text-align: center;
    }
    .produto img {
      max-width: 100%;
      border-radius: 8px;
    }
    .produto h3 {
      color: goldenrod;
      margin: 10px 0 5px;
    }
    .produto p {
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <header>Catálogo de Semi-Joias</header>
  <main>
    <div class="form-container">
      <h2>Cadastrar Produto</h2>
      <input type="text" id="nome" placeholder="Nome da joia">
      <input type="text" id="valor" placeholder="Valor (R$)">
      <textarea id="descricao" placeholder="Descrição"></textarea>
      <input type="text" id="imagem" placeholder="URL da imagem">
      <button onclick="adicionarProduto()">Adicionar</button>
    </div>

    <h2>Catálogo</h2>
    <div class="catalogo" id="catalogo"></div>
  </main>

  <script>
    function adicionarProduto() {
      const nome = document.getElementById('nome').value;
      const valor = document.getElementById('valor').value;
      const descricao = document.getElementById('descricao').value;
      const imagem = document.getElementById('imagem').value;

      if (!nome || !valor || !descricao || !imagem) {
        alert("Preencha todos os campos!");
        return;
      }

      const catalogo = document.getElementById('catalogo');
      const produto = document.createElement('div');
      produto.className = 'produto';
      produto.innerHTML = `
        <img src="${imagem}" alt="${nome}">
        <h3>${nome}</h3>
        <p><strong>R$ ${valor}</strong></p>
        <p>${descricao}</p>
      `;
      catalogo.appendChild(produto);

      // Limpar campos
      document.getElementById('nome').value = '';
      document.getElementById('valor').value = '';
      document.getElementById('descricao').value = '';
      document.getElementById('imagem').value = '';
    }
  </script>
</body>
</html>
