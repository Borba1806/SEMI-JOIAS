<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo | Luxo Semi Joias</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>
<body>

<header>

<div class="logo">
💎 Luxo Semi Joias
</div>

<nav>
<a href="index.html">Início</a>
<a href="catalogo.html">Catálogo</a>
<a href="index.html#contato">Contato</a>
</nav>

</header>

<section class="catalogo-topo">

<h1>Catálogo de Semi-Joias</h1>

<p>
Cadastre e exiba seus produtos facilmente.
</p>

</section>

<section class="cadastro">

<h2>Adicionar Produto</h2>

<form id="produtoForm">

<input
type="text"
id="nome"
placeholder="Nome da Semi-Joia"
required>

<input
type="number"
id="preco"
placeholder="Preço"
required>

<input
type="text"
id="imagem"
placeholder="URL da Imagem"
required>

<textarea
id="descricao"
placeholder="Descrição do produto"
required>
</textarea>

<button type="submit">
Adicionar Produto
</button>

</form>

</section>

<section class="produtos">

<h2>Produtos Cadastrados</h2>

<div id="listaProdutos" class="grid-produtos">

</div>

</section>

<script src="script.js"></script>

</body>
</html>
